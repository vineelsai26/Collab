packages:
  - apps/*
  - packages/*

allowBuilds:
  '@clerk/shared': true
  core-js: true
  esbuild: true
  protobufjs: true
  puppeteer: true
  sharp: true
  unrs-resolver: true

packageExtensions:
  '@tailwindcss/typography@*':
    peerDependencies:
      tailwindcss: '>=3.0.0 || >=4.0.0'

peerDependencyRules:
  allowedVersions:
    tailwindcss: 4.3.1

minimumReleaseAgeExclude:
  - '@ai-sdk/anthropic@3.0.85'
  - '@ai-sdk/gateway@3.0.133'
  - '@ai-sdk/openai@3.0.72'
  - '@ai-sdk/provider-utils@4.0.30'
  - '@posthog/core@1.35.1'
  - '@posthog/types@1.390.0'
  - ai@6.0.207
  - posthog-js@1.390.0
  - '@clerk/backend@3.8.4'
  - '@clerk/shared@4.22.0'
